site_name: gh-portfolio-ops
site_description: Scheduled and dispatch automation jobs across the nolte/* GitHub portfolio
repo_url: https://github.com/nolte/gh-portfolio-ops
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search:
      lang:
        - en
        - de
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: de
          name: Deutsch
          build: true
          nav_translations:
            Home: Startseite
            Configuration: Konfiguration

markdown_extensions:
  - tables
  - admonition
  - attr_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Configuration: configuration.md
