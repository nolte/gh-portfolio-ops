name: Release CD Deliver Docs

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  docs:
    uses: nolte/gh-plumbing/.github/workflows/reusable-mkdocs.yaml@v1.1.25
    with:
      requirements: docs/requirements.txt
