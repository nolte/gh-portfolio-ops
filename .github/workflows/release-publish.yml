name: Release Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Draft tag to publish. Must match an existing release-drafter draft."
        required: true
        type: string
      dry_run:
        description: "Validate only; do not flip draft -> published."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    uses: nolte/gh-plumbing/.github/workflows/reusable-release-publish.yml@v1.1.25
    with:
      tag: ${{ inputs.tag }}
      dry_run: ${{ inputs.dry_run }}
      app-id: ${{ vars.PORTFOLIO_APP_ID }}
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
      app-private-key: ${{ secrets.PORTFOLIO_APP_PRIVATE_KEY }}
