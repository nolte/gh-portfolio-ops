name: CI

on:
  pull_request:
  push:
    branches: [develop, main]

permissions:
  contents: read

env:
  # Enable Task's remote-taskfile experiment so the nolte/taskfiles includes
  # resolve in CI (matches the portfolio ci.yml convention).
  TASK_X_REMOTE_TASKFILES: "1"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install pre-commit
      # --yes auto-trusts the remote Taskfile includes (nolte/taskfiles) in the
      # non-interactive CI run; without it task exits 104 on the trust prompt.
      - name: Lint
        run: task --yes lint
      - name: Test
        run: task --yes test
      - name: Install docs dependencies
        run: pip install -r docs/requirements.txt
      - name: Docs (mkdocs build --strict)
        run: task --yes docs
