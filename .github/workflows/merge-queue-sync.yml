name: Merge Queue Sync

on:
  schedule:
    # GitHub does not guarantee the exact minute; ~every 10 min is realistic.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: merge-queue-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync board and apply automerge label
        env:
          # Classic PAT with repo + project + read:org; read:org lets gh project
          # resolve the noltarium org board (else "unknown owner type").
          GH_TOKEN: ${{ secrets.MERGE_QUEUE_TOKEN }}
          REPO_OWNER: nolte
          PROJECT_OWNER: noltarium
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
        run: bash scripts/merge-queue-sync.sh
